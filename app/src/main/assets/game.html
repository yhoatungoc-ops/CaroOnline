<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CARO ONLINE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#1c1208;}
#loading{
  display:flex;align-items:center;justify-content:center;
  height:100vh;flex-direction:column;gap:18px;
  color:#c8a84b;font-family:'Arial',sans-serif;
  position:fixed;inset:0;z-index:10;background:#1c1208;
}
.spin{
  width:56px;height:56px;
  border:4px solid rgba(200,168,75,.18);
  border-top-color:#c8a84b;
  border-radius:50%;
  animation:sp .75s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg)}}
.gtitle{font-size:1.15rem;letter-spacing:5px;font-weight:700;text-transform:uppercase;}
.gsub{font-size:.65rem;opacity:.55;letter-spacing:2px;text-transform:uppercase;}
#gframe{
  position:fixed;inset:0;width:100%;height:100%;
  border:none;display:none;
}
.err{
  color:#e05555;font-size:.8rem;text-align:center;
  padding:0 30px;line-height:1.8;
}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div class="gtitle">⬛⬜ CARO ONLINE</div>
  <div class="gsub">Đang khởi động...</div>
</div>

<iframe id="gframe" allowfullscreen allow="autoplay"></iframe>

<script>
(function(){
  function b64ToBlob(b64, type){
    var bin = atob(b64);
    var arr = new Uint8Array(bin.length);
    for(var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return new Blob([arr], {type: type});
  }

  function launchGame(b64){
    try{
      var blob = b64ToBlob(b64, 'text/html');
      var url  = URL.createObjectURL(blob);
      var fr   = document.getElementById('gframe');
      fr.src   = url;
      fr.style.display = 'block';
      fr.onload = function(){
        URL.revokeObjectURL(url);
        document.getElementById('loading').style.display = 'none';
      };
    } catch(e){
      showError('Lỗi khởi động game:<br>' + e.message);
    }
  }

  function showError(msg){
    document.getElementById('loading').innerHTML =
      '<div class="spin" style="border-top-color:#e05555"></div>' +
      '<div class="gtitle" style="color:#e05555">LỖI</div>' +
      '<div class="err">' + msg + '</div>';
  }

  // Load game_data.js (chứa GAME_B64)
  var s = document.createElement('script');
  s.src = 'game_data.js';
  s.onload = function(){
    if(typeof GAME_B64 !== 'undefined' && GAME_B64.length > 1000){
      launchGame(GAME_B64);
    } else {
      showError(
        'Chưa có dữ liệu game!<br><br>' +
        'Chạy file <b>THEM_GAME.py</b><br>' +
        'để thêm game vào APK.<br><br>' +
        'Xem README.txt để biết thêm.'
      );
    }
  };
  s.onerror = function(){
    showError(
      'Không tìm thấy game_data.js<br><br>' +
      'Hãy chạy <b>THEM_GAME.py</b><br>' +
      'rồi build lại APK.'
    );
  };
  document.head.appendChild(s);
})();
</script>

</body>
</html>
